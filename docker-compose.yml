services:

  oikos:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        GIT_DATE: ${GIT_DATE:-}
    image: atsob/oikos:latest
    container_name: oikos
    network_mode: host
    environment:
      - DB_NAME=Oikos
      - DB_USER=admin
      - DB_PASSWORD=31.12.1969
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_TIMEZONE=Europe/Athens
      - APP_DATA_DIR=/app
      - OLLAMA_IP=127.0.0.1
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=llama3.2:3b
      - PERSIST_DIR=/app/storage_rag
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /mnt/dockerapps/docker/docker_data/oikos/data/database_backups:/app/database_backups      
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --workers 3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  oikos_https:
    image: nginx:alpine
    container_name: oikos_https
    network_mode: host
    volumes:
      - ./nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
      - ./ssl/rootCA.pem:/etc/nginx/ssl/rootCA.pem:ro
    depends_on:
      - oikos
    restart: unless-stopped

  oikos_scheduler:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        GIT_DATE: ${GIT_DATE:-}
    image: atsob/oikos:latest
    container_name: oikos_scheduler
    network_mode: host
    environment:
      - DB_NAME=Oikos
      - DB_USER=admin
      - DB_PASSWORD=31.12.1969
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_TIMEZONE=Europe/Athens
      - APP_DATA_DIR=/app
      - OLLAMA_IP=127.0.0.1
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=llama3.2:3b
      - PERSIST_DIR=/app/storage_rag
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /mnt/dockerapps/docker/docker_data/oikos/data/database_backups:/app/database_backups      
    command: python scheduler.py
    restart: unless-stopped

